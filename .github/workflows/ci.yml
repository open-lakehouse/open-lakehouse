name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default permissions: read-only. Individual jobs can request more via their
# own `permissions:` block if they truly need write access.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pipx install poetry==2.1.0

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check scripts/ tests/

      - name: Black
        run: poetry run black --check scripts/ tests/

      - name: ShellCheck on lakehouse CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # informational only — the CLI has known SC2086 word-split warnings
          shellcheck -S warning lakehouse || true

      - name: Bash syntax check
        run: bash -n lakehouse

      - name: Validate compose files
        run: |
          for f in docker-compose-*.yml; do
            docker compose -f "$f" config -q && echo "✓ $f"
          done

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pipx install poetry==2.1.0

      - run: poetry install --with dev,test

      - name: pytest (unit only, no docker)
        run: poetry run pytest tests/ --ignore=tests/integration -v

  spark-image-pull:
    name: Verify Spark 4.1 image pulls
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Pull and check Spark 4.1
        run: |
          docker pull apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu
          docker run --rm apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu \
            /opt/spark/bin/spark-submit --version 2>&1 | grep -E "version [0-9]"
          echo "Spark 4.1 image OK"

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pipx install poetry==2.1.0

      - run: poetry install --with dev,test

      - name: pytest -m security
        run: poetry run pytest -m security -v
