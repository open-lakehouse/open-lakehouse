# Baked Spark 4.1 defaults for the ECS Fargate standalone cluster.
#
# This is a cloud-native variant of config/spark/spark-defaults.conf.example:
# S3A talks to real AWS S3 via the task IAM role (no endpoint override, no static
# keys). Per-deployment values (Unity Catalog URI/token, warehouse dir, extra
# catalogs) are layered on at runtime via SPARK_EXTRA_CONF (Terraform's
# extra_spark_conf var) so this file stays secret-free and reusable.

# ============================================================================
# Iceberg + Delta extensions (order matters: Iceberg first, Delta second)
# ============================================================================
spark.sql.extensions                      org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,io.delta.sql.DeltaSparkSessionExtension

# Default Spark catalog as DeltaCatalog — Delta extension functions need this.
spark.sql.catalog.spark_catalog           org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.sql.sources.default                 delta

# ============================================================================
# S3 (real AWS S3 via the task IAM role — no static credentials)
# ============================================================================
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider com.amazonaws.auth.DefaultAWSCredentialsProviderChain
# UC stores table LOCATIONs as s3:// (no 'a'); map that scheme to S3AFileSystem.
spark.hadoop.fs.s3.impl                   org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.AbstractFileSystem.s3.impl org.apache.hadoop.fs.s3a.S3A

# ============================================================================
# Web UI reverse proxy — the standalone master proxies every worker UI at
# /proxy/<worker-id>, so only the master needs a public hostname (no per-worker
# DNS). spark.ui.reverseProxyUrl is set at runtime by entrypoint.sh from
# SPARK_REVERSE_PROXY_URL (the public master URL).
# ============================================================================
spark.ui.reverseProxy                     true

# ============================================================================
# Event logging (history)
# ============================================================================
spark.eventLog.enabled                    true
spark.eventLog.dir                        /opt/spark-data/logs
spark.history.fs.logDirectory             /opt/spark-data/logs
