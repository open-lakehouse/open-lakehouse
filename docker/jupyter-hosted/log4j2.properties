rootLogger.level = error
appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %p %c{1}: %m%n
rootLogger.appenderRef.stdout.ref = console
# silence the noisy streaming-shutdown loggers entirely
logger.kafka.name = org.apache.kafka
logger.kafka.level = off
logger.v2write.name = org.apache.spark.sql.execution.datasources.v2
logger.v2write.level = off
logger.taskset.name = org.apache.spark.scheduler.TaskSetManager
logger.taskset.level = off
